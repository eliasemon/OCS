version: '3.8'

services:
  appnest-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: appnest-test
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/packages', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - appnest-test-net

networks:
  appnest-test-net:
    driver: bridge
